<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serena Bruzzesi/ContactMe</title>
    <link rel="stylesheet" href="styles.css">
    
</head>


<body>

    <svg width = "1000" height = "250">
        <rect width="150" height = "150" fill = "orange">
            <animate attributeName="x" from="0" to="300" dur="3s" fill="freeze" repeatCount="indefinite"/>
        </rect>
    </svg>

    <svg width = "2000" height = "2000">
        <circle cx = "100" cy = "100" r = "50" fill = "green" stroke = "black"/>
    </svg>

    <svg width = "2000" height = "2000">
        <rect width = "300" height = "100" x = "20" y = "20" fill = "yellow" style ="stroke:black; stroke-linecap:round; stroke-width:20"/>
    </svg>

    <svg width = "2000" height = "2000">
        <polyline style = "stroke-linejoin:miter;stroke:black;stroke-width:12; fill:none;" points = "100 100, 150 150, 200 100, 250 150, 300 100"/>
    </svg>
    



</body>

</html>
